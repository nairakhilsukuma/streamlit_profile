projects_intro: "A short list of active work. This page goes deeper into what each project is, where it stands, and where it could go next."
projects:
  - slug: "profile-webapp"
    name: "Profile WebApp"
    status: "Now building"
    summary: "A polished, settings-driven Streamlit profile app that behaves more like a modern portfolio experience than a plain dashboard."
    github_url: "https://github.com/"
    stack:
      - "Python"
      - "Streamlit"
      - "YAML-driven content"
    outcomes:
      - "Create a profile that feels alive and interactive."
      - "Keep all content editable from configuration rather than code."
      - "Give visitors clear paths into projects and scheduling."
    description:
      - "This project turns a static profile into an interactive experience. Instead of treating a personal site as a brochure, it treats it as a product surface with purposeful navigation and clear calls to action."
      - "The structure is intentionally modular so the content can evolve as your work changes without rewriting the app each time."
  - slug: "calendar-booking-flow"
    name: "Calendar Booking Flow"
    status: "Configuring"
    summary: "A secure scheduling layer that routes visitors into a Google booking page without storing calendar credentials in the app."
    github_url: "https://github.com/"
    stack:
      - "Google Calendar"
      - "Booking links"
      - "Profile UX"
    outcomes:
      - "Reduce friction for people who want to meet."
      - "Keep the security surface small."
      - "Separate public profile content from private calendar data."
    description:
      - "The scheduling experience is designed around a provider-managed booking page. That keeps Google handling availability, rescheduling, and calendar writes while the app simply creates a clean entry point."
      - "If you later want a deeper API integration, the structure can be extended with OAuth and secrets management without redoing the landing flow."
  - slug: "project-story-pages"
    name: "Project Story Pages"
    status: "In progress"
    summary: "A dedicated projects page that gives each build enough context, narrative, links, and next-step framing without adding extra routes."
    github_url: "https://github.com/"
    stack:
      - "Callable pages"
      - "Content architecture"
      - "Navigation"
    outcomes:
      - "Make projects easier to scan from the landing page."
      - "Create depth without cluttering the home view."
      - "Keep navigation elegant while staying within two pages."
    description:
      - "The projects page gives each build enough space for explanation without pushing visitors through extra routes. The landing page stays sharp and high-signal, while the projects page handles the deeper context."
      - "This gives you a structure that can grow naturally as your portfolio expands."

